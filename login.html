<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guest Login | SkatersCrib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CORE STYLES & VARIABLES (SKATERSCRIB THEME)
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* STRICT NO SCROLL LOCK */
        html, body { 
            height: 100vh !important; 
            width: 100vw !important;
            overflow: hidden !important; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
        }

        /* === SKATERSCRIB THEME VARIABLES === */
        :root {
            --bg-color: #F8FAFC;
            --bg-secondary: #F1F5F9; 
            --bg-card: #FFFFFF; 
            --text-main: #0F172A;
            --text-muted: #64748B;
            --accent-color: #f97316; /* SkatersCrib Orange */
            --accent-dark: #c2410c;  
            --border-color: #E2E8F0;
            --input-icon: #94A3B8;
            --page-text: #334155; 
            --toggle-bg: #E2E8F0; 
        }

        /* DARK MODE */
        body.dark-mode {
            --bg-color: #0B1120; 
            --bg-secondary: #1E293B; 
            --bg-card: #1E293B; 
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8;
            --accent-color: #fb923c; 
            --accent-dark: #f97316; 
            --border-color: #334155;
            --input-icon: #64748B;
            --page-text: #E2E8F0; 
            --toggle-bg: #334155; 
        }

        body { 
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            display: flex;
            flex-direction: column; 
            position: relative;
        }

        /* RTL SUPPORT */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }
        [dir="rtl"] .mr-3 { margin-left: 0.75rem; margin-right: 0; }
        [dir="rtl"] .input-icon { left: auto; right: 20px; }
        [dir="rtl"] .input-field { padding: clamp(10px, 2vh, 14px) 50px clamp(10px, 2vh, 14px) 20px !important; }
        [dir="rtl"] .btn-icon { margin-left: 0; margin-right: 8px; transform: rotate(180deg); }

        /* =========================================
           TOP CONTROLS BAR
           ========================================= */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding: 1.5rem 2rem;
            gap: 1.5rem;
            z-index: 50;
            flex-shrink: 0;
        }

        .toggle { 
            width: 52px; height: 28px; 
            background: var(--bg-secondary); 
            border: 2px solid var(--text-main);
            border-radius: 30px; position: relative; cursor: pointer; transition: 0.3s; 
            flex-shrink: 0;
        }
        body.dark-mode .toggle { border-color: var(--accent-color); }

        .toggle::before { 
            content: ''; position: absolute; width: 20px; height: 20px; 
            background: white; border-radius: 50%; top: 2px; left: 2px; 
            border: 1px solid var(--text-main);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark-mode .toggle::before { 
            transform: translateX(24px); 
            background: #333; 
            border-color: var(--accent-color);
        }
        
        .top-btn-text { 
            font-size: 0.75rem; font-weight: 900; color: var(--text-main); 
            background: var(--bg-secondary); border: 2px solid var(--text-main); 
            padding: 6px 16px; border-radius: 30px; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 1px; 
        }
        .top-btn-text:hover { 
            background: var(--accent-color); color: #fff; border-color: var(--accent-color);
        }
        body.dark-mode .top-btn-text { border-color: var(--accent-color); }
        body.dark-mode .top-btn-text:hover { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }

        /* MAIN WRAPPER */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
            z-index: 10;
        }

        /* LOGIN CARD (NEO-BRUTALIST) */
        .login-card {
            background-color: var(--bg-card);
            border: 3px solid var(--text-main);
            border-radius: 20px;
            padding: clamp(1.5rem, 4vh, 3rem) 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 12px 12px 0px var(--text-main);
            display: flex;
            flex-direction: column;
            gap: clamp(16px, 2.5vh, 28px); 
            position: relative;
            overflow: hidden !important; 
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode .login-card {
            border-color: var(--accent-color);
            box-shadow: 12px 12px 0px var(--accent-color);
        }

        /* HEADERS */
        .auth-logo { text-align: center; margin-bottom: 4px; }
        .auth-header { text-align: center; }
        .auth-header h2 { font-size: clamp(1.5rem, 3vh, 2rem); font-weight: 900; color: var(--text-main); margin-bottom: 6px; letter-spacing: -0.5px; text-transform: uppercase;}
        .auth-header p { font-size: clamp(0.85rem, 1.8vh, 0.95rem); color: var(--text-muted); margin: 0; font-weight: 600; }

        /* FORM */
        form {
            display: flex;
            flex-direction: column;
            gap: clamp(14px, 2vh, 20px); 
            margin: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label { font-size: 0.75rem; font-weight: 800; color: var(--text-main); margin: 0; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--input-icon); font-size: 1rem; transition: color 0.3s; pointer-events: none; }
        
        /* Brutalist inputs */
        .input-field {
            width: 100%;
            padding: clamp(12px, 2vh, 14px) 20px clamp(12px, 2vh, 14px) 46px;
            border: 3px solid var(--text-main);
            background-color: var(--bg-secondary);
            color: var(--text-main);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.3s ease-in-out;
            margin: 0;
            box-shadow: 4px 4px 0px var(--text-main);
        }
        body.dark-mode .input-field { border-color: var(--accent-color); box-shadow: 4px 4px 0px var(--accent-color); background-color: var(--bg-color); }
        
        .input-field::placeholder { color: var(--input-icon); font-weight: 600; }
        .input-field:focus { 
            outline: none; 
            background-color: var(--bg-card);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--text-main);
        }
        body.dark-mode .input-field:focus { box-shadow: 6px 6px 0px var(--accent-color); }

        .input-field:focus + .input-icon, 
        .input-field:focus ~ .input-icon { 
            color: var(--accent-color); 
        }

        /* Password Field Specifics */
        .password-field { padding-right: 50px !important; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text-main); background: var(--bg-card); border: 2px solid var(--text-main); cursor: pointer;
            padding: 4px 8px; border-radius: 8px; transition: all 0.3s; font-size: 0.85rem; z-index: 5;
        }
        body.dark-mode .password-toggle { border-color: var(--accent-color); color: var(--accent-color); }
        .password-toggle:hover, .password-toggle:focus { background-color: var(--accent-color); color: white; border-color: var(--accent-color); outline: none; }
        
        [dir="rtl"] .password-field { padding-right: 46px !important; padding-left: 50px !important; }
        [dir="rtl"] .password-toggle { right: auto; left: 12px; }

        .utility-row {
            display: flex; justify-content: space-between; align-items: center;
            margin: 0; padding: 2px 4px;
        }

        input[type="checkbox"] {
            width: 18px; height: 18px; border-radius: 4px; cursor: pointer;
            accent-color: var(--accent-color);
            border: 2px solid var(--text-main);
        }

        /* Brutalist submit button */
        .auth-btn {
            width: 100%; 
            padding: clamp(14px, 2.5vh, 16px);
            background-color: var(--accent-color);
            color: #FFFFFF !important; 
            border: 3px solid var(--text-main); 
            border-radius: 12px;
            font-size: 1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; transition: all 0.3s ease;
            margin-top: 8px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0px var(--text-main);
        }
        body.dark-mode .auth-btn { border-color: var(--accent-color); box-shadow: 4px 4px 0px var(--accent-color); }

        .auth-btn:hover { 
            background-color: var(--accent-dark);
            transform: translate(-2px, -2px); 
            box-shadow: 6px 6px 0px var(--text-main); 
        }
        body.dark-mode .auth-btn:hover { box-shadow: 6px 6px 0px var(--accent-color); }

        /* DIVIDER */
        .divider { text-align: center; position: relative; margin: 4px 0; }
        .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: var(--text-main); opacity: 0.2; }
        body.dark-mode .divider::before { background: var(--accent-color); opacity: 0.4; }
        .divider span { position: relative; background: var(--bg-card); padding: 0 16px; color: var(--text-main); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        body.dark-mode .divider span { color: var(--text-muted); }

        /* SOCIALS (Brutalist Blocks) */
        .social-login { display: flex; justify-content: center; gap: 16px; }
        .social-btn {
            width: 54px; height: 54px;
            border: 3px solid var(--text-main); border-radius: 12px; 
            background-color: var(--bg-secondary);
            font-size: 1.2rem; color: var(--text-main);
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0px var(--text-main);
        }
        body.dark-mode .social-btn { border-color: var(--accent-color); box-shadow: 4px 4px 0px var(--accent-color); background-color: var(--bg-color); color: var(--accent-color); }

        .social-btn:hover { 
            background-color: var(--accent-color);
            border-color: var(--text-main);
            color: #FFFFFF;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--text-main);
        }
        body.dark-mode .social-btn:hover { border-color: var(--accent-color); box-shadow: 6px 6px 0px var(--accent-color); color: #fff;}

        /* FOOTER LINKS */
        .login-link { text-align: center; font-size: 0.85rem; color: var(--text-muted); font-weight: 700; margin-top: 8px; }
        .login-link a { color: var(--accent-color); font-weight: 900; text-decoration: none; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;}
        .login-link a:hover { color: var(--text-main); }
        body.dark-mode .login-link a:hover { color: #fff; }

        /* =========================================
           ULTRA-COMPACT MOBILE OPTIMIZATIONS 
           ========================================= */
        @media (max-width: 400px), (max-height: 750px) {
            .top-bar { padding: 0.8rem 1rem; gap: 1rem; }
            .login-card { padding: 1.5rem !important; gap: 16px !important; width: 95%; border-radius: 16px; box-shadow: 8px 8px 0px var(--text-main); }
            body.dark-mode .login-card { box-shadow: 8px 8px 0px var(--accent-color); }
            .auth-logo { margin-bottom: 0 !important; }
            .auth-header h2 { font-size: 1.5rem !important; margin-bottom: 2px !important; }
            .auth-header p { font-size: 0.8rem !important; } 
            
            form { gap: 12px !important; }
            .form-group { gap: 6px !important; }
            .input-field { padding: 10px 16px 10px 40px !important; font-size: 0.85rem !important; height: 44px !important; box-shadow: 2px 2px 0px var(--text-main); }
            body.dark-mode .input-field { box-shadow: 2px 2px 0px var(--accent-color); }
            .input-icon { font-size: 0.9rem !important; left: 14px !important; }
            
            .password-field { padding-right: 44px !important; }
            .password-toggle { right: 8px !important; font-size: 0.8rem !important; padding: 4px 6px !important;}

            [dir="rtl"] .input-field { padding: 10px 44px 10px 16px !important; }
            [dir="rtl"] .input-icon { right: 14px !important; left: auto !important; }
            [dir="rtl"] .password-field { padding-left: 44px !important; padding-right: 16px !important; }
            [dir="rtl"] .password-toggle { left: 8px !important; right: auto !important; }
            
            .utility-row span { font-size: 0.75rem !important; }
            .utility-row a { font-size: 0.75rem !important; }
            
            .auth-btn { height: 46px !important; padding: 0 !important; font-size: 0.85rem !important; margin-top: 4px !important; box-shadow: 2px 2px 0px var(--text-main); }
            body.dark-mode .auth-btn { box-shadow: 2px 2px 0px var(--accent-color); }
            
            .social-btn { height: 44px !important; width: 44px !important; font-size: 1rem !important; box-shadow: 2px 2px 0px var(--text-main); }
            body.dark-mode .social-btn { box-shadow: 2px 2px 0px var(--accent-color); }
            
            .login-link { font-size: 0.8rem !important; }
        }

        @media (max-height: 600px) {
            .top-bar { padding: 0.5rem 1rem; }
            .login-card { gap: 12px !important; padding: 1.2rem !important; }
            form { gap: 12px !important; }
            .auth-header p { display: none !important; }
            .input-field { height: 40px !important; }
            .auth-btn { height: 40px !important; font-size: 0.8rem !important; }
            .social-btn { height: 38px !important; width: 38px !important; font-size: 0.9rem !important; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="flex items-center gap-3" style="cursor: pointer;" onclick="document.getElementById('theme-toggle').click()">
            <i class="fas fa-sun text-sm font-black" style="color: var(--text-main); transition: color 0.3s;"></i>
            <div class="toggle" id="theme-toggle"></div>
            <i class="fas fa-moon text-sm font-black" style="color: var(--text-main); transition: color 0.3s;"></i>
        </div>
        <button id="rtl-toggle" class="top-btn-text">RTL Mode</button>
    </div>

    <div class="main-wrapper">
        <div class="login-card">

            <div class="auth-logo flex justify-center items-center">
                <a href="index.html" class="text-2xl font-black tracking-tighter block" style="color: black !important; text-decoration: none; font-size: 1.5rem !important; line-height: 2rem !important;">
                    SkatersCrib
                </a>
            </div>

            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to track your custom builds.</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="input-field" placeholder="rider@example.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="input-field password-field" placeholder="••••••••" required>
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="toggle-password" tabindex="-1" aria-label="Toggle password visibility">
                            <i class="fas fa-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="utility-row flex-wrap sm:flex-nowrap gap-2">
                    <label class="flex items-center cursor-pointer truncate">
                        <input type="checkbox" class="flex-shrink-0 cursor-pointer">
                        <span class="ml-2 text-xs font-black uppercase truncate" style="color: var(--text-main);">Remember me</span>
                    </label>
                    <a href="#" class="text-xs font-black uppercase transition whitespace-nowrap" style="color: var(--accent-color);">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn">Sign In <i class="fas fa-arrow-right ml-3 btn-icon"></i></button>
            </form>

            <div class="divider"><span>Or authenticate with</span></div>

            <div class="social-login">
                <button class="social-btn" type="button" title="Sign in with Google"><i class="fab fa-google"></i></button>
                <button class="social-btn" type="button" title="Sign in with Apple"><i class="fab fa-apple"></i></button>
                <button class="social-btn" type="button" title="Sign in with Facebook"><i class="fab fa-facebook-f"></i></button>
            </div>

            <div class="login-link">
                New to the workshop? <a href="register.html">Register Here</a>
            </div>

        </div>
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const themeIconSun = document.querySelector('.fa-sun');
        const themeIconMoon = document.querySelector('.fa-moon');
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeIconSun.style.color = "var(--text-muted)";
            themeIconMoon.style.color = "var(--accent-color)";
        }

        themeToggle.onclick = (e) => {
            e.stopPropagation(); 
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            if(isDark) {
                themeIconSun.style.color = "var(--text-muted)";
                themeIconMoon.style.color = "var(--accent-color)";
            } else {
                themeIconSun.style.color = "var(--text-main)";
                themeIconMoon.style.color = "var(--text-main)";
            }
        };

        // --- RTL LOGIC ---
        const rtlToggle = document.getElementById('rtl-toggle');
        const savedDir = localStorage.getItem('dir') || 'ltr';
        
        if (savedDir === 'rtl') {
            document.documentElement.dir = 'rtl';
            rtlToggle.innerText = "LTR MODE";
        }

        rtlToggle.onclick = () => {
            const isRTL = document.documentElement.dir === 'rtl';
            document.documentElement.dir = isRTL ? 'ltr' : 'rtl';
            localStorage.setItem('dir', isRTL ? 'ltr' : 'rtl');
            rtlToggle.innerText = isRTL ? 'RTL MODE' : 'LTR MODE';
        };

        // --- PASSWORD TOGGLE LOGIC ---
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggle-icon');

        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        });

        // --- FORM SUBMISSION ---
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Redirecting to the user dashboard
            window.location.href = 'user.html'; 
        });
    </script>
</body>
</html>
